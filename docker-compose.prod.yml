services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prd-agent:latest
    container_name: prd-agent
    restart: unless-stopped
    init: true
    ports:
      - "${APP_PORT:-80}:8080"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-sqlite+pysqlite:////app/data/prd_agent.db}
      TEST_DATABASE_URL: ${DOCKER_TEST_DATABASE_URL:-sqlite+pysqlite:////app/data/prd_agent_test.db}
      API_HOST: 127.0.0.1
      API_PORT: 8000
      PROJECT_ROOT: /app
      UPLOAD_DIR: /app/uploads
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      LLM_NATIVE_STRUCTURED_OUTPUT: ${LLM_NATIVE_STRUCTURED_OUTPUT:-}
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-1}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-5}
      DATABASE_READ_TIMEOUT_SECONDS: ${DATABASE_READ_TIMEOUT_SECONDS:-30}
      MAX_PRD_REVISION_ROUNDS: ${MAX_PRD_REVISION_ROUNDS:-3}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-20971520}
      UPLOAD_MAX_FILES_PER_PROJECT: ${UPLOAD_MAX_FILES_PER_PROJECT:-8}
      CREWAI_DISABLE_TELEMETRY: "true"
      CREWAI_TRACING_ENABLED: "false"
    volumes:
      - prd_data:/app/data
      - prd_uploads:/app/uploads
    stop_grace_period: 30s

volumes:
  prd_data:
  prd_uploads:
