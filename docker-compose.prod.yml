# =====================================================
# Docker Compose 生产配置
# =====================================================
# 使用: docker-compose -f docker-compose.prod.yml up -d
#
# 特点：
# - 生产镜像（无调试工具）
# - Nginx 反向代理
# - 持久化存储
# - 日志聚合
# - 自动重启策略
# - 健康检查
#
# =====================================================

version: '3.8'

services:
  # ============================================
  # MySQL 数据库（生产配置）
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: prd-agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: prd_agent
      MYSQL_USER: ${MYSQL_USER:-prd_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: UTC
    ports:
      - "127.0.0.1:3306:3306"  # 仅本地访问
    volumes:
      # 数据持久化
      - mysql_data:/var/lib/mysql
      # 初始化脚本
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
      # 备份脚本
      - ./docker/backup.sh:/docker-entrypoint-initdb.d/backup.sh:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_0900_ai_ci
      --default-authentication-plugin=mysql_native_password
      --max_allowed_packet=256M
      --log_bin=/var/log/mysql/mysql-bin.log
      --server-id=1
      --binlog_format=ROW
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-prd_user}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prd-network

  # ============================================
  # FastAPI 后端（生产镜像）
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: prd-agent-api
    restart: unless-stopped
    environment:
      # LLM 配置（从 .env 读取）
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}

      # 数据库配置
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-prd_user}:${MYSQL_PASSWORD}@mysql:3306/prd_agent?charset=utf8mb4
      TEST_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-prd_user}:${MYSQL_PASSWORD}@mysql:3306/prd_agent_test?charset=utf8mb4

      # API 配置
      API_HOST: 0.0.0.0
      API_PORT: 8000
      UPLOAD_DIR: /app/uploads

      # 工作流配置
      MAX_PRD_REVISION_ROUNDS: ${MAX_PRD_REVISION_ROUNDS:-3}

      # CrewAI 配置
      CREWAI_DISABLE_TELEMETRY: "true"
      CREWAI_TRACING_ENABLED: "false"

      # Python
      PYTHONUNBUFFERED: "1"

    expose:
      - "8000"  # 仅 Nginx 可访问
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prd-network

  # ============================================
  # 异步任务 Worker（生产镜像）
  # ============================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: prd-agent-worker
    restart: unless-stopped
    environment:
      # LLM 配置
      LLM_MODEL: ${LLM_MODEL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}

      # 数据库配置
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-prd_user}:${MYSQL_PASSWORD}@mysql:3306/prd_agent?charset=utf8mb4
      TEST_DATABASE_URL: mysql+pymysql://${MYSQL_USER:-prd_user}:${MYSQL_PASSWORD}@mysql:3306/prd_agent_test?charset=utf8mb4

      # Worker 配置
      WORKER_POLL_SECONDS: ${WORKER_POLL_SECONDS:-1}
      UPLOAD_DIR: /app/uploads

      # CrewAI 配置
      CREWAI_DISABLE_TELEMETRY: "true"
      CREWAI_TRACING_ENABLED: "false"

      # Python
      PYTHONUNBUFFERED: "1"

    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - prd-network
    command: >
      sh -c "uv run prd-agent db-upgrade &&
             uv run prd-agent worker"

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: prd-agent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx 配置
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/default.conf:/etc/nginx/conf.d/default.conf:ro
      # SSL 证书（需自己配置）
      - ./docker/certs:/etc/nginx/certs:ro
      # 日志
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - prd-network

# =====================================================
# 持久化卷
# =====================================================
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  nginx_logs:
    driver: local

# =====================================================
# 网络
# =====================================================
networks:
  prd-network:
    driver: bridge
